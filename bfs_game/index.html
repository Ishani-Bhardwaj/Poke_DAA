<!DOCTYPE html>
<html>
<head>
    <title>Pokemon BFS Game</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
        }

        #grid{
            display:grid;
            grid-template-columns: repeat(8,60px);
            gap:5px;
            justify-content:center;
            margin-top:20px;
        }

        .cell{
            width:60px;
            height:60px;
            background:#eee;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            cursor:pointer;
        }

        .start{ background:orange; }
        .goal{ background:green; }
        .wall{ background:black; }
        .visited{ background:lightblue; }
        .path{ background:yellow; }

        button{
            margin:10px;
            padding:10px 20px;
            font-size:16px;
        }
    </style>
</head>

<body>

<h1>⚡ Help Pokémon get to Nurse Joy to recover  </h1>

<button onclick="runBFS()">Find Shortest Path</button>
<button onclick="resetGrid()">Reset</button>

<div id="grid"></div>

<script>

let n = 8;
let grid = [];
let start = [0,0];
let goal = [7,7];

function initGrid(){
    grid = [];
    for(let i=0;i<n;i++){
        let row = [];
        for(let j=0;j<n;j++){
            row.push(0);
        }
        grid.push(row);
    }
}

function createGrid(){
    let container = document.getElementById("grid");
    container.innerHTML = "";

    for(let i=0;i<n;i++){
        for(let j=0;j<n;j++){
            let cell = document.createElement("div");
            cell.classList.add("cell");
            cell.id = i+"-"+j;

            if(i==start[0] && j==start[1]){
                cell.classList.add("start");
                cell.innerHTML = "⚡";
            }
            else if(i==goal[0] && j==goal[1]){
                cell.classList.add("goal");
                cell.innerHTML = "⭐";
            }

            cell.onclick = () => toggleWall(i,j);
            container.appendChild(cell);
        }
    }
}

function toggleWall(i,j){
    if((i==start[0] && j==start[1]) || (i==goal[0] && j==goal[1])) return;

    let cell = document.getElementById(i+"-"+j);

    if(grid[i][j] == 0){
        grid[i][j] = 1;
        cell.classList.add("wall");
    } else {
        grid[i][j] = 0;
        cell.classList.remove("wall");
    }
}

async function runBFS(){

    let visited = Array.from({length:n}, () => Array(n).fill(false));
    let parent = Array.from({length:n}, () => Array(n).fill(null));

    let queue = [];
    queue.push(start);
    visited[start[0]][start[1]] = true;

    let dx = [1,-1,0,0];
    let dy = [0,0,1,-1];

    while(queue.length > 0){
        let [x,y] = queue.shift();

        if(x==goal[0] && y==goal[1]) break;

        for(let i=0;i<4;i++){
            let nx = x + dx[i];
            let ny = y + dy[i];

            if(nx>=0 && ny>=0 && nx<n && ny<n && !visited[nx][ny] && grid[nx][ny]==0){
                queue.push([nx,ny]);
                visited[nx][ny] = true;
                parent[nx][ny] = [x,y];

                let cell = document.getElementById(nx+"-"+ny);
                cell.classList.add("visited");

                await sleep(100);
            }
        }
    }

  
    let path = [];
    let cur = goal;

    while(cur){
        path.push(cur);
        cur = parent[cur[0]][cur[1]];
    }

    path.reverse();

    for(let [x,y] of path){
        let cell = document.getElementById(x+"-"+y);
        cell.classList.add("path");
        await sleep(150);
    }
}

function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

function resetGrid(){
    initGrid();
    createGrid();
}

initGrid();
createGrid();

</script>

</body>
</html>
