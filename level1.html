<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 1 | PokéDAA Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .header img { width: 80px; filter: drop-shadow(0 0 10px #3b82f6); }
        .quiz-box { width: 800px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border-left: 5px solid #3b82f6; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .progress { color: #93c5fd; font-size: 14px; margin-bottom: 10px; letter-spacing: 2px; }
        h2 { margin-top: 0; color: #f8fafc; font-size: 24px; line-height: 1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .option { background: #1e293b; padding: 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid #334155; display: flex; align-items: center; gap: 15px; font-size: 16px; }
        .option:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); transform: translateY(-3px); }
        .option-letter { background: #3b82f6; color: #0f172a; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Bulbasaur">
        <h1>LEVEL 01: DATA STRUCTURES</h1>
    </div>

    <div class="quiz-box">
        <div class="progress">QUESTION <span id="qNum">1</span> / 10 | SCORE: <span id="scoreDisplay">0</span></div>
        <h2 id="questionText">Connecting to C++ Backend...</h2>
        <div class="options-grid" id="optionsContainer"></div>
    </div>

    <script>
        let questions = [];
        let currentQ = 0; 
        let score = 0;
        const letters = ["A", "B", "C", "D"];

        async function fetchQuestionsFromCpp() {
            try {
                const response = await fetch('http://localhost:8080/api?task=level1'); 
                questions = await response.json();
                loadQuestion();
            } catch (error) {
                document.getElementById('questionText').innerText = "ERROR: Cannot connect to C++ Engine.";
                console.error(error);
            }
        }

        function loadQuestion() {
            if (currentQ >= questions.length) {
                if (score >= 8) {
                    alert(`LEVEL 1 CLEARED! Score: ${score}/10. Unlocking BFS Arena...`);
                    window.location.href = 'bfs_test.html';
                } else {
                    alert(`SYSTEM FAILURE. Score: ${score}/10. 8/10 required. Restarting.`);
                    location.reload();
                }
                return;
            }
            
            document.getElementById('qNum').innerText = currentQ + 1;
            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('questionText').innerText = questions[currentQ].q;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = "";
            
            questions[currentQ].opts.forEach((opt, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.onclick = () => checkAnswer(index);
                div.innerHTML = `<div class="option-letter">${letters[index]}</div> ${opt}`;
                container.appendChild(div);
            });
        }

        function checkAnswer(selectedIndex) {
            if (selectedIndex === questions[currentQ].ans) score++;
            currentQ++;
            loadQuestion();
        }

        fetchQuestionsFromCpp();
    </script>
</body>
</html>
