<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PokéDAA Arena | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { height: 100vh; background: #0f172a; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        .bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, #4338ca 0%, transparent 70%); filter: blur(80px); opacity: 0.5; z-index: -1; }
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); padding: 50px; border-radius: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { width: 120px; margin-bottom: 25px; filter: drop-shadow(0 0 15px #6366f1); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        input { padding: 15px; border-radius: 12px; border: 1px solid #334155; margin: 15px 0; width: 100%; background: rgba(15, 23, 42, 0.6); color: white; font-family: 'Orbitron'; outline: none; font-size: 16px; text-align: center; box-sizing: border-box; }
        input:focus { border-color: #6366f1; box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
        button { padding: 15px; border-radius: 12px; border: none; background: linear-gradient(90deg, #6366f1, #a855f7); color: white; cursor: pointer; font-family: 'Orbitron'; width: 100%; font-weight: 700; transition: 0.3s; margin-top: 20px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { letter-spacing: 3px; box-shadow: 0 0 30px rgba(99, 102, 241, 0.6); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="card">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png" class="logo" alt="Pokeball">
        <h2 style="letter-spacing: 4px; margin-top: 0;">TRAINER LOGIN</h2>
        <input type="text" id="tName" placeholder="ENTER TRAINER ID">
        <button onclick="login()">ENTER ARENA</button>
    </div>
    <script>
        function login() {
            const name = document.getElementById('tName').value;
            if(name.trim() !== "") {
                localStorage.setItem("trainerName", name);
                window.location.href = 'level1.html';
            } else {
                alert("Please enter a valid Trainer ID.");
            }
        }
    </script>
</body>
</html>
